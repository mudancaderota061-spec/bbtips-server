<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 360px; margin: 0; padding: 14px; font-family: Arial, sans-serif; background:#101820; color:#fff; }
    h2 { margin:0 0 12px; color:#ffd166; font-size:20px; }
    label { display:block; margin:10px 0 6px; }
    input { width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #29d7ff; background:#06131d; color:#fff; font-size:16px; }
    button { width:100%; margin-top:12px; padding:12px; border:0; border-radius:7px; background:#0b7189; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; }
    button:hover { filter:brightness(1.12); }
    #logout { background:#8a1f1f; }
    #status { margin-top:14px; font-size:14px; }
    .ok { color:#40ff7b; }
    .bad { color:#ff6b6b; }
    .info { color:#ffd166; }
    .small { margin-top:10px; font-size:12px; color:#9ee7ff; line-height:1.35; }
  </style>
</head>
<body>
  <h2>BBTips Robô</h2>
  <label>Login</label>
  <input id="login" placeholder="Digite seu login" autocomplete="username" />
  <label>Senha</label>
  <input id="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" />
  <button id="activate">Entrar e ativar</button>
  <button id="logout">Sair / Desativar</button>
  <div id="status" class="info">Carregando...</div>
  <div class="small">O acesso é liberado pelo painel admin online.</div>
  <script src="popup.js"></script>
</body>
</html>
